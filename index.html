<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick-a-Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --grey-100: #f5f5f5;
      --grey-200: #e8e8e8;
      --grey-400: #999999;
      --grey-600: #555555;
      --transition-speed: 420ms;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: var(--black);
      overflow: hidden;
    }

    /* ── LOADING SCREEN ─────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      background: var(--white);
      z-index: 999;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--grey-200);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    #loading p { font-size: 13px; color: var(--grey-400); letter-spacing: 0.06em; text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR SCREEN ───────────────────────────────────── */
    #error-screen {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: var(--white);
      z-index: 998;
      padding: 40px;
      text-align: center;
    }
    #error-screen h2 { font-size: 22px; font-weight: 700; }
    #error-screen p  { color: var(--grey-600); font-size: 15px; max-width: 420px; line-height: 1.6; }
    #error-screen code { font-size: 12px; background: var(--grey-100); padding: 2px 6px; border-radius: 4px; }

    /* ── STAGE ──────────────────────────────────────────── */
    #stage {
      position: fixed; inset: 0;
      display: none;
      overflow: hidden;
    }

    /* ── SLIDES ─────────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
      background: var(--white);
      transform: translateX(100%);
      opacity: 0;
      transition:
        transform var(--transition-speed) var(--ease-out-expo),
        opacity   var(--transition-speed) var(--ease-out-expo);
      will-change: transform, opacity;
      overflow: hidden;
    }
    .slide.active  { transform: translateX(0);   opacity: 1; }
    .slide.exiting { transform: translateX(-6%); opacity: 0; }
    .slide.exiting-back { transform: translateX(100%); opacity: 0; }
    .slide.incoming      { transform: translateX(100%); opacity: 0; }
    .slide.incoming-back { transform: translateX(-6%);  opacity: 0; }

    /* ── INNER CARD ─────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
    }

    /* ── TITLE PAGE ─────────────────────────────────────── */
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-400);
      margin-bottom: 18px;
    }
    .title-card h1 {
      font-size: clamp(34px, 6vw, 60px);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--black);
      margin-bottom: 22px;
    }
    .title-divider {
      width: 40px; height: 3px;
      background: var(--black);
      margin-bottom: 22px;
      border-radius: 2px;
    }
    .title-card .description {
      font-size: 16px;
      line-height: 1.7;
      color: var(--grey-600);
      font-weight: 400;
      margin-bottom: 36px;
    }

    /* ── STORY SLIDE ─────────────────────────────────────── */
    .story-card h2 {
      font-size: clamp(20px, 3.5vw, 28px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--black);
      margin-bottom: 14px;
    }
    .story-card .description {
      font-size: 15px;
      line-height: 1.75;
      color: var(--grey-600);
      margin-bottom: 28px;
    }
    .question-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 10px;
    }
    .story-card .question {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--black);
      margin-bottom: 22px;
    }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn-group {
      display: flex; flex-direction: column; gap: 10px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 15px 20px;
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--black);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      text-align: left;
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 120ms ease,
        box-shadow 180ms ease;
      -webkit-font-smoothing: antialiased;
    }
    .btn:hover {
      background: var(--white);
      color: var(--black);
      box-shadow: 0 8px 28px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn-arrow {
      flex-shrink: 0;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      border: 2px solid currentColor;
      font-size: 11px;
      transition: transform 180ms ease;
    }
    .btn:hover .btn-arrow { transform: translateX(3px); }

    .btn.start {
      padding: 17px 24px;
      font-size: 15px;
      font-weight: 700;
      width: fit-content;
    }

    /* End-state */
    .btn-group.end-state .btn:last-child { display: none; }
    .btn-group.end-state .btn:first-child { width: fit-content; }

    /* ── BACK BUTTON ─────────────────────────────────────── */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--grey-400);
      cursor: pointer;
      padding: 0;
      margin-bottom: 28px;
      letter-spacing: 0.02em;
      transition: color 160ms ease;
      width: fit-content;
    }
    .back-btn:hover { color: var(--black); }
    .back-btn svg {
      width: 16px; height: 16px;
      transition: transform 160ms ease;
    }
    .back-btn:hover svg { transform: translateX(-3px); }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .slide { padding: 28px 20px; }
      .btn { padding: 13px 16px; font-size: 13px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide { transition: opacity 200ms ease; transform: none !important; }
      .slide.exiting,
      .slide.exiting-back { opacity: 0; transform: none !important; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading story</p>
</div>

<div id="error-screen">
  <h2>Couldn't load the story.</h2>
  <p>Make sure <code>story.json</code> is in the same folder as this HTML file and you're running it through a local server or file host.</p>
</div>

<div id="stage"></div>

<script>
  (() => {
    let story = null;
    let slideMap = {};
    // history stack: array of slide IDs (or 'title')
    const history = [];

    const loading     = document.getElementById('loading');
    const errorScreen = document.getElementById('error-screen');
    const stage       = document.getElementById('stage');

    fetch('story.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => {
        story = data;
        story.slides.forEach(s => { slideMap[s.id] = s; });
        loading.style.display = 'none';
        stage.style.display   = 'block';
        renderTitle(false);
      })
      .catch(err => {
        console.error('Failed to load story.json:', err);
        loading.style.display = 'none';
        errorScreen.style.display = 'flex';
      });

    // ── TITLE PAGE ────────────────────────────────────────
    function renderTitle(goingBack) {
      history.push('title');
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.id = 'slide-title';
      slide.innerHTML = `
        <div class="card title-card">
          <p class="eyebrow">Interactive Story</p>
          <h1>${esc(story.title)}</h1>
          <div class="title-divider"></div>
          <p class="description">${esc(story.description)}</p>
          <div class="btn-group">
            <button class="btn start" onclick="window._goTo(1)">
              Begin the story
              <span class="btn-arrow">→</span>
            </button>
          </div>
        </div>`;
      transitionIn(slide, goingBack);
    }

    // ── GO FORWARD ────────────────────────────────────────
    window._goTo = function(id) {
      const data = slideMap[id];
      if (!data) { console.warn('Unknown slide ID:', id); return; }
      history.push(id);
      const slide = buildStorySlide(data);
      transitionIn(slide, false);
    };

    // ── GO BACK ───────────────────────────────────────────
    window._goBack = function() {
      if (history.length <= 1) return;
      history.pop(); // remove current
      const prev = history[history.length - 1];
      history.pop(); // remove prev so push inside render adds it back

      if (prev === 'title') {
        renderTitle(true);
      } else {
        const data = slideMap[prev];
        if (!data) return;
        history.push(prev);
        const slide = buildStorySlide(data);
        transitionIn(slide, true);
      }
    };

    // ── TRANSITION ────────────────────────────────────────
    function transitionIn(newSlide, goingBack) {
      newSlide.classList.add(goingBack ? 'incoming-back' : 'incoming');
      stage.appendChild(newSlide);

      const current = stage.querySelector('.slide.active');
      if (current) {
        current.classList.remove('active');
        current.classList.add(goingBack ? 'exiting-back' : 'exiting');
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          newSlide.classList.remove('incoming', 'incoming-back');
          newSlide.classList.add('active');
        });
      });

      setTimeout(() => { if (current) current.remove(); }, 480);
    }

    // ── BUILD STORY SLIDE ─────────────────────────────────
    function buildStorySlide(data) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.id = `slide-${data.id}`;

      const isEnd = data.button1_link === data.button2_link
                 && data.button1_text  === data.button2_text;
      const btnGroupClass = isEnd ? 'btn-group end-state' : 'btn-group';

      slide.innerHTML = `
        <div class="card story-card">
          <button class="back-btn" onclick="window._goBack()">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
          </button>
          <h2>${esc(data.title)}</h2>
          <p class="description">${esc(data.description)}</p>
          <p class="question-label">Your choice</p>
          <p class="question">${esc(data.question)}</p>
          <div class="${btnGroupClass}">
            <button class="btn" onclick="window._goTo(${data.button1_link})">
              <span>${esc(data.button1_text)}</span>
              <span class="btn-arrow">→</span>
            </button>
            <button class="btn" onclick="window._goTo(${data.button2_link})">
              <span>${esc(data.button2_text)}</span>
              <span class="btn-arrow">→</span>
            </button>
          </div>
        </div>`;
      return slide;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  })();
</script>
</body>
</html>
