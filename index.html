<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick-a-Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --grey-100: #f5f5f5;
      --grey-200: #e8e8e8;
      --grey-400: #999999;
      --grey-600: #555555;
      --transition-speed: 420ms;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--white);
      color: var(--black);
      overflow: hidden;
    }

    /* ── LOADING SCREEN ─────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      background: var(--white);
      z-index: 999;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--grey-200);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    #loading p { font-size: 13px; color: var(--grey-400); letter-spacing: 0.06em; text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR SCREEN ───────────────────────────────────── */
    #error-screen {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: var(--white);
      z-index: 998;
      padding: 40px;
      text-align: center;
    }
    #error-screen h2 { font-size: 22px; font-weight: 700; }
    #error-screen p  { color: var(--grey-600); font-size: 15px; max-width: 420px; line-height: 1.6; }
    #error-screen code { font-size: 12px; background: var(--grey-100); padding: 2px 6px; border-radius: 4px; }

    /* ── STAGE ──────────────────────────────────────────── */
    #stage {
      position: fixed; inset: 0;
      display: none;
      overflow: hidden;
    }

    /* ── SLIDES ─────────────────────────────────────────── */
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
      background: var(--white);
      transform: translateX(100%);
      opacity: 0;
      transition:
        transform var(--transition-speed) var(--ease-out-expo),
        opacity   var(--transition-speed) var(--ease-out-expo);
      will-change: transform, opacity;
      overflow-y: auto;
    }
    .slide.active  { transform: translateX(0);     opacity: 1; }
    .slide.exiting { transform: translateX(-6%);   opacity: 0; }
    .slide.incoming{ transform: translateX(100%);  opacity: 0; }

    /* ── INNER CARD ─────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 620px;
      padding: 0;
    }

    /* ── TITLE PAGE ─────────────────────────────────────── */
    .card.title-card {
      display: flex; flex-direction: column; gap: 0;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-400);
      margin-bottom: 20px;
    }
    .title-card h1 {
      font-size: clamp(38px, 7vw, 68px);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--black);
      margin-bottom: 28px;
    }
    .title-divider {
      width: 48px; height: 3px;
      background: var(--black);
      margin-bottom: 28px;
      border-radius: 2px;
    }
    .title-card .description {
      font-size: 17px;
      line-height: 1.7;
      color: var(--grey-600);
      font-weight: 400;
      margin-bottom: 48px;
    }

    /* ── STORY SLIDE ─────────────────────────────────────── */
    .card.story-card {
      display: flex; flex-direction: column; gap: 0;
    }
    .slide-meta {
      display: flex; align-items: baseline; gap: 14px;
      margin-bottom: 22px;
    }
    .slide-num {
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      color: var(--grey-200);
      letter-spacing: -0.04em;
      user-select: none;
    }
    .slide-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-400);
    }
    .story-card h2 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--black);
      margin-bottom: 20px;
    }
    .story-card .description {
      font-size: 16px;
      line-height: 1.75;
      color: var(--grey-600);
      margin-bottom: 36px;
    }
    .question-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 14px;
    }
    .story-card .question {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--black);
      margin-bottom: 32px;
    }

    /* ── BUTTONS ─────────────────────────────────────────── */
    .btn-group {
      display: flex; flex-direction: column; gap: 12px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--black);
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      text-align: left;
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 120ms ease,
        box-shadow 180ms ease;
      -webkit-font-smoothing: antialiased;
    }
    .btn:hover {
      background: var(--white);
      color: var(--black);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }
    .btn-arrow {
      flex-shrink: 0;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      border: 2px solid currentColor;
      font-size: 12px;
      transition: transform 180ms ease;
    }
    .btn:hover .btn-arrow { transform: translateX(3px); }

    /* Start button slightly different */
    .btn.start {
      padding: 20px 28px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      width: fit-content;
    }

    /* End-state: both buttons same = show one restart button */
    .btn-group.end-state { gap: 0; }
    .btn-group.end-state .btn:last-child { display: none; }
    .btn-group.end-state .btn:first-child { width: fit-content; }

    /* ── PROGRESS BAR ───────────────────────────────────── */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: var(--black);
      transition: width 400ms var(--ease-out-expo);
      z-index: 100;
      pointer-events: none;
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .slide { padding: 32px 20px; }
      .slide-num { font-size: 48px; }
      .btn { padding: 16px 18px; font-size: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        transition: opacity 200ms ease;
        transform: none !important;
      }
      .slide.exiting { opacity: 0; transform: none !important; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading story</p>
</div>

<!-- Error -->
<div id="error-screen">
  <h2>Couldn't load the story.</h2>
  <p>Make sure <code>story.json</code> is in the same folder as this HTML file and you're running it through a local server or file host.</p>
</div>

<!-- Stage -->
<div id="stage"></div>

<!-- Progress bar -->
<div id="progress-bar" style="width:0%"></div>

<script>
  (() => {
    // ── STATE ─────────────────────────────────────────────
    let story = null;
    let slideMap = {};
    let totalSlides = 0;
    let visitedCount = 0;
    const visited = new Set();

    // ── DOM REFS ──────────────────────────────────────────
    const loading    = document.getElementById('loading');
    const errorScreen= document.getElementById('error-screen');
    const stage      = document.getElementById('stage');
    const progressBar= document.getElementById('progress-bar');

    // ── FETCH STORY ───────────────────────────────────────
    fetch('story.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        story = data;
        story.slides.forEach(s => { slideMap[s.id] = s; });
        totalSlides = story.slides.length;
        init();
      })
      .catch(err => {
        console.error('Failed to load story.json:', err);
        loading.style.display = 'none';
        errorScreen.style.display = 'flex';
      });

    // ── INIT ──────────────────────────────────────────────
    function init() {
      loading.style.display = 'none';
      stage.style.display   = 'block';
      renderTitle();
    }

    // ── TITLE PAGE ────────────────────────────────────────
    function renderTitle() {
      const slide = document.createElement('div');
      slide.className = 'slide active';
      slide.id = 'slide-title';
      slide.innerHTML = `
        <div class="card title-card">
          <p class="eyebrow">Interactive Story</p>
          <h1>${escHtml(story.title)}</h1>
          <div class="title-divider"></div>
          <p class="description">${escHtml(story.description)}</p>
          <div class="btn-group">
            <button class="btn start" onclick="window._goTo(1)">
              Begin the story
              <span class="btn-arrow">→</span>
            </button>
          </div>
        </div>`;
      stage.appendChild(slide);
    }

    // ── GO TO SLIDE ───────────────────────────────────────
    window._goTo = function(id) {
      const data = slideMap[id];
      if (!data) { console.warn('Unknown slide ID:', id); return; }

      // Track progress
      if (!visited.has(id)) { visited.add(id); visitedCount++; }
      const pct = Math.min(100, Math.round((visitedCount / totalSlides) * 100));
      progressBar.style.width = pct + '%';

      // Build new slide (hidden to the right)
      const newSlide = buildStorySlide(data);
      newSlide.classList.add('incoming');
      stage.appendChild(newSlide);

      // Animate out the current active slide
      const current = stage.querySelector('.slide.active');
      if (current) {
        current.classList.remove('active');
        current.classList.add('exiting');
      }

      // Trigger reflow then animate in
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          newSlide.classList.remove('incoming');
          newSlide.classList.add('active');
        });
      });

      // Clean up exiting slide after transition
      setTimeout(() => {
        if (current) current.remove();
      }, 480);
    };

    // ── BUILD STORY SLIDE ─────────────────────────────────
    function buildStorySlide(data) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.id = `slide-${data.id}`;

      // Detect end-state: both buttons go to same place (restart)
      const isEnd = data.button1_link === data.button2_link
                    && data.button1_text === data.button2_text;

      const btnGroupClass = isEnd ? 'btn-group end-state' : 'btn-group';

      slide.innerHTML = `
        <div class="card story-card">
          <div class="slide-meta">
            <span class="slide-num">${String(data.id).padStart(2,'0')}</span>
            <span class="slide-label">Chapter</span>
          </div>
          <h2>${escHtml(data.title)}</h2>
          <p class="description">${escHtml(data.description)}</p>
          <p class="question-label">Your choice</p>
          <p class="question">${escHtml(data.question)}</p>
          <div class="${btnGroupClass}">
            <button class="btn" onclick="window._goTo(${data.button1_link})">
              <span>${escHtml(data.button1_text)}</span>
              <span class="btn-arrow">→</span>
            </button>
            <button class="btn" onclick="window._goTo(${data.button2_link})">
              <span>${escHtml(data.button2_text)}</span>
              <span class="btn-arrow">→</span>
            </button>
          </div>
        </div>`;
      return slide;
    }

    // ── UTILS ─────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }
  })();
</script>
</body>
</html>
